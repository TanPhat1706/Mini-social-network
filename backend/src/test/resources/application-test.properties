# ==========================================
# CẤU HÌNH DATABASE TEST (SQL SERVER)
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MiniSocialDB_test;encrypt=true;trustServerCertificate=true
spring.datasource.username=pht
spring.datasource.password=141204
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 🟢 CHÍNH LÀ NÓ! TRỊ TẬN GỐC LỖI ENUM ${SPRING_JPA_DATABASE}
spring.jpa.database=SQL_SERVER

# Hibernate cấu hình
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2016Dialect

# ==========================================
# CẤU HÌNH BẢO MẬT & JWT (GIẢ MẠO)
# ==========================================
jwt.secret=DayLaMotDoanSecretKeyRatDaiVaBaoMatDungDeTest1234567890
jwt.expiration=86400000
jwt.refresh.expiration=604800000
cors.allowed.origins=*

# ==========================================
# CÁC BIẾN MÔI TRƯỜNG KHÁC (NGĂN CHẶN LỖI THIẾU BEAN)
# ==========================================
app.upload.dir=./test-uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.port=0
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
