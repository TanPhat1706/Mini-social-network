spring.application.name=backend

# ========== Database Configuration ==========
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
sendStringParametersAsUnicode=${SPRING_JPA_SEND_STRING_PARAMETERS_AS_UNICODE}
# spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.generate_statistics=true

# ========== File Upload Configuration ==========
app.upload.dir=${APP_UPLOAD_DIR}
app.storage.type=${STORAGE_TYPE:local}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE}

# ========== JPA Configuration ==========
spring.jpa.database=${SPRING_JPA_DATABASE}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM}

# ========== JWT Configuration ==========
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

# ========== CORS Configuration ==========
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# ========== Server Configuration ==========
server.servlet.encoding.charset=${SERVER_SERVLET_ENCODING_CHARSET}
server.servlet.encoding.force=${SERVER_SERVLET_ENCODING_FORCE}
server.port=${SERVER_PORT:8080}

# ========== Swagger Configuration ==========
springdoc.swagger-ui.path=${SWAGGER_UI_PATH}
springdoc.api-docs.path=${SWAGGER_API_DOCS_PATH}

# ========== AWS S3 Configuration ==========
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.bucket-name=${AWS_BUCKET_NAME}
aws.endpoint=${AWS_ENDPOINT}
aws.url=${AWS_URL}

# ========== Email Configuration ==========
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8