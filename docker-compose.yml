
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: minisocial_db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "HutechProject2026!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/setup.sh:/docker-entrypoint-initdb.d/setup.sh
    entrypoint: /bin/bash /docker-entrypoint-initdb.d/setup.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: minisocial_backend
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=MiniSocialDB;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: pht
      SPRING_DATASOURCE_PASSWORD: "141204"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_MODE: docker
    container_name: minisocial_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sql_data: